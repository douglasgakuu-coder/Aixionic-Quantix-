version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: quantix-postgres
    environment:
      POSTGRES_DB: quantixfx
      POSTGRES_USER: quantix
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-securepassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantix"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: quantix-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispass}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../packages/backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: quantix-backend
    environment:
      DATABASE_URL: postgresql://quantix:${POSTGRES_PASSWORD:-securepassword}@postgres:5432/quantixfx
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-changeme}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-changeme_refresh}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      BINANCE_API_KEY: ${BINANCE_API_KEY}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - ../packages/backend/src:/app/src
      - ../packages/backend/uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ../packages/frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: quantix-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: quantix-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../docker/nginx/ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot
    depends_on:
      - backend
      - frontend
    restart: unless-stopped
    command: "/bin/sh -c 'while :; do sleep 6h; nginx -s reload; done & nginx -g \"daemon off;\"'"

  certbot:
    image: certbot/certbot
    container_name: quantix-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_data:/etc/letsencrypt
    depends_on:
      - nginx

volumes:
  postgres_data:
  redis_data:
  certbot_www:
  certbot_data: